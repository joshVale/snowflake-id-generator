apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/snowflake-app-*.log
      pos_file /tmp/fluentd-pos/snowflake.log.pos
      tag snowflake.*
      read_from_head true
      <parse>
        @type none
      </parse>
    </source>

    <match snowflake.**>
      @type stdout
    </match>
