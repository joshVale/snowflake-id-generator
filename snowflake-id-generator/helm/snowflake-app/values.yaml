replicaCount: 1

image:
  repository: snowflake-app
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8080
  targetPort: 8080
  nodePort: 30000

ingress:
  enabled: true
  className: contour
  host: snowflake.dev.local
  tls: true
  secretName: snowflake-tls

resources:
  requests:
    cpu: "500m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "500Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuUtilization: 70
  memoryAverageValue: 400Mi

config:
  springApplicationName: "Snowflake ID Generator"
  startingEpoch: "946684800"
  datacenterId: "1"

datasource:
  ddlAuto: "update"
  hibernateDialect: "org.hibernate.dialect.PostgreSQLDialect"

postgres:
  database: snowflake_db
  user: postgres
  password: postgres
  replicas: 2
  storage: 1Gi
  storageClassName: hostpath
  image: postgres:15
